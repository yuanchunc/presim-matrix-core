# =============================================================================
# 奶茶店开店预演 Demo - 经典案例配置
# 25万开奶茶店，从加盟到闭店6个月预演
# =============================================================================

scene: milk_tea_franchise
title: "25万开奶茶店，从加盟到闭店6个月预演"
description: "理想测算月赚2万半年回本，真实预演90%概率6个月现金流断裂闭店"

# -----------------------------------------------------------------------------
# 初始资金与经营模式
# -----------------------------------------------------------------------------
capital:
  initial: 250000          # 启动资金 25万
  equipment_deposit: 10000  # 设备押金/首期投入（首月支出）

business:
  mode: franchise          # franchise=加盟 | self_owned=自营
  franchise_fee: 50000     # 加盟费（一次性）
  franchise_royalty: 0.02  # 品牌使用费 2% 月营收
  franchise_materials: true # 是否强制使用总部物料（成本更高）

# -----------------------------------------------------------------------------
# 选址 - 杭州写字楼商圈
# -----------------------------------------------------------------------------
location:
  city: "杭州"
  area: "写字楼商圈"
  district: "西湖区"
  rent_monthly: 15000      # 月租金 1.5万
  rent_deposit: 45000      # 押三付一
  foot_traffic: 0.7        # 人流系数 (0-1)
  competitors_nearby: 5    # 周边竞品奶茶店数量
  office_workers: 3000     # 写字楼内白领人数

# -----------------------------------------------------------------------------
# 定价策略
# -----------------------------------------------------------------------------
pricing:
  base_price: 16           # 基础款单价 16元/杯
  premium_add: 4           # 高端款加价 4元
  avg_cup_price: 18       # 平均客单价

# -----------------------------------------------------------------------------
# 成本结构
# -----------------------------------------------------------------------------
costs:
  material_ratio: 0.38     # 原料成本占营收比 38%
  labor_monthly: 12000     # 月人力 1.2万 (2-3人)
  utilities_monthly: 2000  # 水电物业 2000/月
  marketing_monthly: 1500  # 推广费用 1500/月

# -----------------------------------------------------------------------------
# 智能体人设模板

# -----------------------------------------------------------------------------
agents:
  # 加盟品牌方
  franchise_brand:
    role: "加盟品牌方"
    behavior: "收取加盟费、品牌使用费，强制使用总部物料"
    impact: "增加固定成本，降低利润空间"

  # 房东
  landlord:
    role: "房东"
    behavior: "租金固定，押三付一"

  # 原材料供应商
  supplier:
    role: "供应商"
    behavior: "加盟模式下价格偏高，有淡季波动"

  # 门店员工
  staff:
    role: "门店员工"
    behavior: "固定工资+提成，新手期效率低"

  # 竞品
  competitors:
    count: 5
    behavior: "会降价促销、做活动，分流客流"
    response: "新店开业后3个月内竞品会跟进促销"

  # 消费者类型
  consumers:
    price_sensitive: 0.4   # 价格敏感型 40%
    brand_loyal: 0.25      # 品牌忠诚型 25%
    novelty_seeking: 0.35  # 尝鲜型 35%

# -----------------------------------------------------------------------------
# 环境规则与市场初始状态
# -----------------------------------------------------------------------------
environment:
  # 商圈客流规律
  traffic_pattern:
    peak_hours: [11, 12, 17, 18]  # 午休、下班高峰
    weekend_boost: 1.2             # 周末客流提升 20%
    seasonality:                   # 淡旺季 (6个月: 3-8月)
      month_3: 0.9   # 3月 淡
      month_4: 1.0   # 4月 平
      month_5: 1.1   # 5月 略升
      month_6: 1.0   # 6月 平
      month_7: 0.85  # 7月 暑假 写字楼人少
      month_8: 0.9   # 8月 淡

  # 竞品初始状态
  competitors_init:
    - name: "蜜雪冰城"
      price_level: "low"
      traffic_share: 0.25
    - name: "古茗"
      price_level: "mid"
      traffic_share: 0.25
    - name: "茶百道"
      price_level: "mid"
      traffic_share: 0.2
    - name: "喜茶"
      price_level: "high"
      traffic_share: 0.15
    - name: "其他"
      price_level: "low"
      traffic_share: 0.15

  # 理想测算（加盟商宣传口径）
  ideal_forecast:
    monthly_revenue: 60000   # 月营收 6万
    monthly_profit: 20000    # 月利润 2万
    payback_months: 6        # 6个月回本

# -----------------------------------------------------------------------------
# 仿真参数
# -----------------------------------------------------------------------------
simulation:
  steps: 6                  # 6个月，每月一轮
  months_per_step: 1
  seed: 42
  unit: "month"             # 轮次单位

# -----------------------------------------------------------------------------
# 解析器配置（用于报告生成）
# -----------------------------------------------------------------------------
parser:
  scene_type: milk_tea_franchise
  risk_thresholds:
    cash_flow_min: 5000     # 现金流安全垫
    profit_negative_steps: 2
  metric_keys:
    - step
    - revenue
    - cost
    - profit
    - cash_flow
    - traffic
